name: Check Upstream Releases

on:
  workflow_dispatch:
    inputs:
      debug:
        description: 'Enable debug logging'
        required: false
        default: 'false'
  schedule:
    # Run every 6 hours
    - cron: '0 */6 * * *'

jobs:
  check_releases:
    runs-on: ubuntu-latest
    outputs:
      has_updates: ${{ steps.check_updates.outputs.has_updates }}
      update_summary: ${{ steps.check_updates.outputs.update_summary }}
      updated_tools: ${{ steps.check_updates.outputs.updated_tools }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for upstream releases
        id: check_updates
        shell: bash
        run: |
          HAS_UPDATES=false
          UPDATE_SUMMARY=""
          UPDATED_TOOLS=""

          VERSIONS_FILE=".last_known_versions"
          if [ ! -f "$VERSIONS_FILE" ]; then
            touch "$VERSIONS_FILE"
          fi

          get_latest_release() {
            local repo=$1
            gh api repos/$repo/releases/latest --jq '.tag_name' 2>/dev/null || echo "unknown"
          }

          # Format: tool:repo
          TOOLS=(
            "kubectl:kubernetes/kubernetes"
            "helm:helm/helm"
            "jq:jqlang/jq"
            "skopeo:containers/skopeo"
            "oras:oras-project/oras"
            "cosign:sigstore/cosign"
            "flux:fluxcd/flux2"
          )

          for tool_info in "${TOOLS[@]}"; do
            IFS=':' read -r tool repo <<< "$tool_info"
            echo "Checking $tool from $repo..."

            LATEST=$(get_latest_release "$repo")
            echo "Latest $tool release: $LATEST"

            LAST_KNOWN=$(grep "^$tool=" "$VERSIONS_FILE" | cut -d'=' -f2 || echo "")

            if [ -z "$LAST_KNOWN" ]; then
              echo "$tool=$LATEST" >> "$VERSIONS_FILE"
              UPDATE_SUMMARY+="- $tool: New tracking started at $LATEST\n"
            elif [ "$LATEST" != "$LAST_KNOWN" ] && [ "$LATEST" != "unknown" ]; then
              HAS_UPDATES=true
              UPDATE_SUMMARY+="- $tool: $LAST_KNOWN → $LATEST\n"
              sed -i "s/^$tool=.*/$tool=$LATEST/" "$VERSIONS_FILE"
              UPDATED_TOOLS="${UPDATED_TOOLS} ${tool}=${LATEST}"
            fi
          done

          echo "has_updates=$HAS_UPDATES" >> "$GITHUB_OUTPUT"
          # Strip leading space from UPDATED_TOOLS
          echo "updated_tools=${UPDATED_TOOLS# }" >> "$GITHUB_OUTPUT"
          echo "update_summary<<EOF" >> "$GITHUB_OUTPUT"
          echo -e "$UPDATE_SUMMARY" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

          if [ "$HAS_UPDATES" = "true" ] || [ -n "$UPDATE_SUMMARY" ]; then
            git config --local user.email "action@github.com"
            git config --local user.name "GitHub Action"
            git add "$VERSIONS_FILE"
            git diff --quiet && git diff --staged --quiet || git commit -m "Update last known versions [skip ci]"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Push version updates
        if: steps.check_updates.outputs.has_updates == 'true' || steps.check_updates.outputs.update_summary != ''
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.ref }}

  trigger_builds:
    needs: check_releases
    if: needs.check_releases.outputs.has_updates == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger per-tool builds
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # updated_tools is space-separated "tool=version" pairs, e.g. "helm=v4.2.0 kubectl=v1.37.0"
          for entry in ${{ needs.check_releases.outputs.updated_tools }}; do
            TOOL="${entry%%=*}"
            VERSION="${entry##*=}"
            echo "Triggering build for $TOOL $VERSION"
            gh workflow run build-tool.yml \
              --repo ${{ github.repository }} \
              --field tool="$TOOL" \
              --field version="$VERSION"
          done

      - name: Calculate kube-essential CalVer
        id: calver
        run: |
          YY=$(date +%y)
          MM=$(date +%m)
          DATE_PREFIX="${YY}.${MM}"

          LATEST=$(gh api "repos/${{ github.repository }}/releases" \
            --jq "[.[] | select(.tag_name | startswith(\"kube-essential-v${DATE_PREFIX}\"))] | first | .tag_name // \"\"" \
            2>/dev/null || echo "")

          if [[ -n "$LATEST" ]]; then
            PATCH="${LATEST##*.}"
            NEXT_PATCH=$((PATCH + 1))
          else
            NEXT_PATCH=0
          fi

          echo "version=${DATE_PREFIX}.${NEXT_PATCH}" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Trigger kube-essential build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run build-kube-essential.yml \
            --repo ${{ github.repository }} \
            --field version="${{ steps.calver.outputs.version }}"

      - name: Create tracking issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Close any previously open upstream-update issues before creating a new one
          gh issue list \
            --repo ${{ github.repository }} \
            --label "upstream-update,automated" \
            --state open \
            --json number \
            --jq '.[].number' \
          | xargs -r -I{} gh issue close {} \
              --repo ${{ github.repository }} \
              --comment "Superseded by a newer upstream update issue."

          ISSUE_TITLE="Upstream Updates Detected - $(date +'%Y-%m-%d')"
          UPDATE_SUMMARY="${{ needs.check_releases.outputs.update_summary }}"
          ISSUE_BODY="## Upstream Updates Summary

          The following upstream releases were detected:

          ${UPDATE_SUMMARY}

          Individual tool builds and a new kube-essential release have been triggered automatically.

          This issue was automatically created by the upstream release checker."

          gh issue create \
            --repo ${{ github.repository }} \
            --title "$ISSUE_TITLE" \
            --body "$ISSUE_BODY" \
            --label "upstream-update,automated"
