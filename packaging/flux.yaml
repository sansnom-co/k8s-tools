# nfpm config for flux package
# Required env vars: TOOL_VERSION, PACKAGE_MAINTAINER, PACKAGE_URL, PACKAGE_VENDOR, PACKAGE_LICENSE
name: flux
version: ${TOOL_VERSION}
release: "1"
arch: amd64
maintainer: ${PACKAGE_MAINTAINER}
vendor: ${PACKAGE_VENDOR}
homepage: ${PACKAGE_URL}
license: ${PACKAGE_LICENSE}
description: >-
  GitOps toolkit for Kubernetes (statically linked).
  The flux CLI for managing Flux GitOps deployments.
depends:
  - ca-certificates
section: utils
contents:
  - src: static_binaries/flux
    dst: /usr/local/bin/flux
    file_info:
      mode: 0755
